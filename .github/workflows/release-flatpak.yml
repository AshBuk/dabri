name: Release Flatpak

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # Only stable tags (v1.0.0), not RC (v1.0.0-rc.1)
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to attach the bundle. Leave empty to only build.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-flatpak:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install flatpak and Builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --user flathub org.flatpak.Builder

      - name: Build Flatpak
        run: |
          echo "=== Building Flatpak for ${{ matrix.arch }} (runtime/SDK pulled from Flathub) ==="
          # --disable-rofiles-fuse: FUSE is unavailable on GitHub runners.
          flatpak run org.flatpak.Builder \
            --user \
            --install-deps-from=flathub \
            --force-clean \
            --disable-rofiles-fuse \
            --default-branch=stable \
            --repo=repo \
            build-dir io.github.ashbuk.dabri.yml

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          if [ -n "$TAG" ]; then
            VERSION="${TAG#v}"
          else
            # No tag context (plain manual build): fall back to the appdata version.
            VERSION="$(python3 -c 'import xml.etree.ElementTree as ET; print(ET.parse("io.github.ashbuk.dabri.appdata.xml").getroot().find("releases/release").attrib["version"])')"
          fi
          echo "bundle=dabri-${VERSION}-${{ matrix.arch }}.flatpak" >> "$GITHUB_OUTPUT"
          echo "Bundle name: dabri-${VERSION}-${{ matrix.arch }}.flatpak"

      - name: Bundle Flatpak
        run: |
          flatpak build-bundle repo "${{ steps.ver.outputs.bundle }}" io.github.ashbuk.dabri stable
          ls -lh "${{ steps.ver.outputs.bundle }}"

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: dabri-flatpak-${{ matrix.arch }}
          path: ${{ steps.ver.outputs.bundle }}

  release:
    needs: build-flatpak
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download Flatpak bundles
        uses: actions/download-artifact@v4
        with:
          pattern: dabri-flatpak-*
          merge-multiple: true
          path: dist

      - name: Attach Flatpak bundles to Release
        uses: softprops/action-gh-release@v2
        with:
          # Attach to the pushed tag, or to an existing release given via
          # workflow_dispatch (release_tag).
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: dist/*.flatpak
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
