name: Release AppImage

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # Only stable tags (v1.0.0), not RC (v1.0.0-rc.1)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        default: '0.1.0'

permissions:
  contents: write
  actions: read

jobs:
  build-appimage:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x86_64
            base: ubuntu:22.04
          - os: ubuntu-22.04-arm
            arch: aarch64
            base: ubuntu:24.04
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-${{ matrix.arch }}-buildx-appimage-${{ hashFiles('docker/Dockerfile.appimage', 'go.mod', 'go.sum') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.arch }}-buildx-appimage-

    - name: Build AppImage via Docker
      env:
        APP_VERSION: ${{ github.event.inputs.version || github.ref_name }}
      run: |
        echo "=== Building AppImage via Docker (includes Vulkan SDK) ==="
        echo "Version: ${APP_VERSION}"
        docker buildx build \
          -f docker/Dockerfile.appimage \
          --build-arg BASE_IMAGE="${{ matrix.base }}" \
          --build-arg APP_VERSION="${APP_VERSION}" \
          --target artifacts \
          --cache-from type=local,src=/tmp/.buildx-cache \
          --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
          --output type=local,dest=dist .
        echo "=== Build completed ==="
        ls -la dist/

    - name: Move cache
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache
        
    - name: Verify AppImage
      run: |
        # Check if AppImage is executable and valid
        echo "Checking AppImage artifacts..."
        ls -lh dist/*.AppImage
        for appimage in dist/*.AppImage; do
          echo "Verifying: $appimage"
          chmod +x "$appimage"
          file "$appimage"
          # Check if it's a valid AppImage
          if "$appimage" --appimage-help > /dev/null 2>&1; then
            echo "✅ Valid AppImage: $appimage"
          else
            echo "⚠️ AppImage validation failed for: $appimage"
          fi
        done
        
    - name: Upload AppImage artifact
      uses: actions/upload-artifact@v4
      with:
        name: dabri-appimage-${{ matrix.arch }}
        path: |
          dist/*.AppImage
          !dist/tools/

  create-release:
    needs: [build-appimage]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download AppImage artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: dabri-appimage-*
        path: ./artifacts/
        merge-multiple: true

    - name: Compose release body
      id: release_body
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Header: the annotated tag's body (everything after the subject + blank line).
        # Falls back to the subject line if the tag has no body.
        HEADER=$(git tag -l --format='%(contents:body)' "${GITHUB_REF_NAME}")
        if [ -z "${HEADER}" ]; then
          HEADER=$(git tag -l --format='%(contents:subject)' "${GITHUB_REF_NAME}")
        fi
        # Fetch generated notes (What's Changed + Full Changelog) explicitly
        # instead of generate_release_notes: true, so re-running the workflow
        # rebuilds the same body rather than clobbering the existing release.
        NOTES=$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
          -f tag_name="${GITHUB_REF_NAME}" -q .body)
        {
          echo "body<<RELEASE_BODY_EOF"
          echo "${HEADER}"
          echo ""
          echo "${NOTES}"
          echo "RELEASE_BODY_EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./artifacts/*.AppImage
        body: ${{ steps.release_body.outputs.body }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}