app-id: io.github.ashbuk.dabri
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: dabri

# Force cmake modules to install into /app/lib (not /app/lib64). Newer
# cmake/GNUInstallDirs picks lib64 on 64-bit, which splits libs/pkgconfig
# away from the autotools modules in /app/lib and breaks shared-modules
# (e.g. libayatana-ido3-0.4 not found by libayatana-indicator).
build-options:
  libdir: /app/lib

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=org.kde.StatusNotifierWatcher

cleanup:
  - /include
  - /lib/go
  - /lib/pkgconfig
  - /share/man
  - /share/aclocal

modules:
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json

  - name: golang
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib
      - cp -a go /app/lib/go
    sources:
      - type: archive
        url: https://go.dev/dl/go1.25.3.linux-amd64.tar.gz
        sha256: 0335f314b6e7bfe08c3d0cfaa7c19db961b7b99fb20be62b0a826c992ad14e0f
        strip-components: 0

  - name: ffmpeg
    buildsystem: autotools
    no-autogen: true
    config-opts:
      - --prefix=/app
      - --disable-static
      - --enable-shared
      - --disable-doc
      - --disable-debug
      - --disable-ffplay
      - --disable-ffprobe
      - --disable-network
      - --enable-libpulse
    cleanup:
      - /share/ffmpeg
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-7.1.1.tar.xz
        sha256: 733984395e0dbbe5c046abda2dc49a5544e7e0e1e2366bba849222ae9e3a03b1

  - name: xdotool
    buildsystem: simple
    build-commands:
      - make -j${FLATPAK_BUILDER_N_JOBS} PREFIX=/app LDCONFIG=:
      - make PREFIX=/app LDCONFIG=: INSTALLMAN=/app/share/man install
    sources:
      - type: archive
        url: https://github.com/jordansissel/xdotool/archive/refs/tags/v3.20211022.1.tar.gz
        sha256: 82b15a944a5e82fee15e0f6116bd9f642bc3d0bb6989fc0ca5ad9dfe35de0847

  - name: xsel
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/kfish/xsel/archive/refs/tags/1.2.1.tar.gz
        sha256: 18487761f5ca626a036d65ef2db8ad9923bf61685e06e7533676c56d7d60eb14

  - name: wl-clipboard
    buildsystem: meson
    config-opts:
      - -Dzshcompletiondir=no
      - -Dfishcompletiondir=no
    sources:
      - type: archive
        url: https://github.com/bugaevc/wl-clipboard/archive/refs/tags/v2.2.1.tar.gz
        sha256: 6eb8081207fb5581d1d82c4bcd9587205a31a3d47bea3ebeb7f41aa1143783eb

  - name: wtype
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/atx/wtype/archive/refs/tags/v0.4.tar.gz
        sha256: da91786d828b6a6e29b884bc510473939eda052658ebef87d7bdeafa6a8746f9

  # SPIRV-Headers cmake config - required by whisper.cpp >= v1.8.5 Vulkan backend
  - name: spirv-headers
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/KhronosGroup/SPIRV-Headers/archive/refs/tags/vulkan-sdk-1.4.321.0.tar.gz
        sha256: 5bbea925663d4cd2bab23efad53874f2718248a73dcaf9dd21dff8cb48e602fc

  - name: whisper-cpp
    buildsystem: simple
    build-commands:
      - cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DCMAKE_PREFIX_PATH=/app -DCMAKE_INSTALL_RPATH=/app/lib/dabri -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON -DGGML_NATIVE=OFF -DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON -DGGML_AVX512=OFF -DGGML_VULKAN=ON
      - cmake --build build --parallel ${FLATPAK_BUILDER_N_JOBS}
      - install -d /app/lib/dabri /app/include/dabri
      - cp build/src/libwhisper.so* /app/lib/dabri/
      - cp build/ggml/src/libggml*.so* /app/lib/dabri/
      - cp build/ggml/src/ggml-vulkan/libggml-vulkan.so* /app/lib/dabri/
      - cp include/whisper.h /app/include/dabri/
      - cp ggml/include/*.h /app/include/dabri/
    sources:
      - type: archive
        url: https://github.com/ggml-org/whisper.cpp/archive/refs/tags/v1.8.6.tar.gz
        sha256: f8e632016ceae556f3132a16c7f704be1e7715595041f474fa81a2b64c1abf7c

  - name: dabri
    buildsystem: simple
    build-options:
      append-path: /app/lib/go/bin
      env:
        CGO_ENABLED: "1"
        CGO_CFLAGS: -I/app/include/dabri
        CGO_LDFLAGS: -L/app/lib/dabri -lwhisper -lggml -lggml-cpu -lggml-vulkan
        LD_LIBRARY_PATH: /app/lib/dabri
        PKG_CONFIG_PATH: /app/lib/pkgconfig:/usr/lib/pkgconfig
    build-commands:
      - APP_VERSION="$(python3 -c 'import xml.etree.ElementTree as ET; print(ET.parse("io.github.ashbuk.dabri.appdata.xml").getroot().find("releases/release").attrib["version"])')" && go build -mod=vendor -tags systray -trimpath -ldflags "-s -w -X github.com/AshBuk/dabri/v2/internal/version.Version=${APP_VERSION} -linkmode=external -extldflags '-Wl,-rpath,/app/lib/dabri'" -o dabri ./cmd/dabri
      - install -Dm755 dabri /app/bin/dabri
      - install -Dm755 packaging/flatpak/arecord /app/bin/arecord
      - install -Dm755 packaging/flatpak/notify-send /app/bin/notify-send
      - install -Dm644 io.github.ashbuk.dabri.desktop /app/share/applications/io.github.ashbuk.dabri.desktop
      - install -Dm644 io.github.ashbuk.dabri.appdata.xml /app/share/metainfo/io.github.ashbuk.dabri.metainfo.xml
      - install -Dm644 icons/io.github.ashbuk.dabri.png /app/share/icons/hicolor/128x128/apps/io.github.ashbuk.dabri.png
      - install -Dm644 icons/io.github.ashbuk.dabri.svg /app/share/icons/hicolor/scalable/apps/io.github.ashbuk.dabri.svg
    sources:
      - type: dir
        path: .
        skip:
          - .flatpak-builder
          - .git
          - build
          - dist
          - lib
          - logs
          - sources
          - tmp
      - packaging/flatpak/go.mod.yml
